{% extends 'base.html' %}
{% block content %}
<section class="py-16 bg-gradient-to-br from-slate-50 via-white to-primary-50/30">
  <div class="max-w-md mx-auto px-4 sm:px-6 lg:px-8">
    <div class="text-center mb-8 animate-slide-up">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-primary-100 rounded-2xl mb-4">
        <span class="ph ph-sign-in text-primary-600 text-2xl"></span>
      </div>
      <h1 class="text-3xl font-bold bg-gradient-to-r from-slate-900 to-slate-700 bg-clip-text text-transparent mb-2">Welcome Back</h1>
      <p class="text-slate-600">Sign in to continue your construction journey</p>
    </div>
    
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="space-y-3 mb-6 animate-slide-up">
          {% for category, message in messages %}
            <div class="p-4 rounded-xl border-l-4 {{ 'border-l-red-500 bg-red-50 text-red-800' if category=='error' else 'border-l-success-500 bg-success-50 text-success-800' }} shadow-sm">
              <div class="flex items-center gap-2">
                <span class="ph {{ 'ph-warning-circle' if category=='error' else 'ph-check-circle' }} text-lg"></span>
                {{ message }}
              </div>
            </div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}
    
    <form method="post" class="grid gap-6 bg-white/80 backdrop-blur-sm border border-slate-200/60 rounded-2xl p-8 shadow-xl">
      <div>
        <label class="text-sm font-medium text-slate-700 mb-2 block">I am a</label>
        <select name="role" class="w-full border border-slate-300 rounded-xl px-4 py-3 focus:ring-2 focus:ring-primary-500 focus:border-primary-500 transition-colors">
          <option value="customer">🏠 Customer</option>
          <option value="engineer">👷 Engineer</option>
        </select>
      </div>
      <div>
        <label class="text-sm font-medium text-slate-700 mb-2 block">Email</label>
        <input type="email" name="email" class="w-full border border-slate-300 rounded-xl px-4 py-3 focus:ring-2 focus:ring-primary-500 focus:border-primary-500 transition-colors" placeholder="your@email.com" required />
      </div>
      <div>
        <label class="text-sm font-medium text-slate-700 mb-2 block">Password</label>
        <input type="password" name="password" class="w-full border border-slate-300 rounded-xl px-4 py-3 focus:ring-2 focus:ring-primary-500 focus:border-primary-500 transition-colors" placeholder="Enter your password" required />
      </div>
      <button class="inline-flex justify-center items-center gap-2 px-6 py-4 rounded-xl bg-gradient-to-r from-primary-600 to-primary-700 text-white font-medium hover:from-primary-700 hover:to-primary-800 transform hover:scale-105 transition-all shadow-lg">
        <span class="ph ph-sign-in"></span>
        Sign In
      </button>
    </form>
  </div>
</section>
{% endblock %}
