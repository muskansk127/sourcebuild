{% extends 'base.html' %}
{% block content %}
<section class="py-12">
  <div class="max-w-xl mx-auto px-4 sm:px-6 lg:px-8">
    <h1 class="text-2xl font-bold mb-6">Register as Engineer</h1>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="space-y-2 mb-4">
          {% for category, message in messages %}
            <div class="p-3 rounded border {{ 'border-red-300 text-red-700' if category=='error' else 'border-green-300 text-green-700' }}">{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}
    <form method="post" class="grid gap-4 bg-white border border-slate-200 rounded-xl p-6">
      <div>
        <label class="text-sm">Full Name</label>
        <input name="full_name" class="mt-1 w-full border rounded-lg px-3 py-2" required />
      </div>
      <div class="grid sm:grid-cols-2 gap-4">
        <div>
          <label class="text-sm">Email</label>
          <input type="email" name="email" class="mt-1 w-full border rounded-lg px-3 py-2" required />
        </div>
        <div>
          <label class="text-sm">Phone</label>
          <input name="phone" class="mt-1 w-full border rounded-lg px-3 py-2" required />
        </div>
      </div>
      <div class="grid sm:grid-cols-2 gap-4">
        <div>
          <label class="text-sm">Qualification</label>
          <input name="qualification" class="mt-1 w-full border rounded-lg px-3 py-2" required />
        </div>
        <div>
          <label class="text-sm">Experience (years)</label>
          <input name="experience" class="mt-1 w-full border rounded-lg px-3 py-2" required />
        </div>
      </div>
      <div>
        <label class="text-sm">Portfolio Link (optional)</label>
        <input name="portfolio" class="mt-1 w-full border rounded-lg px-3 py-2" placeholder="https://..." />
      </div>
      <div>
        <label class="text-sm">Password</label>
        <input type="password" name="password" class="mt-1 w-full border rounded-lg px-3 py-2" required />
      </div>
      <button class="inline-flex justify-center items-center gap-2 px-4 py-2 rounded-lg bg-primary-600 text-white hover:bg-primary-700">Create Account</button>
    </form>
  </div>
</section>
{% endblock %}
